name: super_sync_codegen
description: >-
  Generates super_sync models, entity adapters and a single typed API from an
  OpenAPI 3 schema. Point it at a spec; get an offline-first data layer.
version: 0.1.0
homepage: https://github.com/AndroidPoet/super_sync
repository: https://github.com/AndroidPoet/super_sync
issue_tracker: https://github.com/AndroidPoet/super_sync/issues

topics:
  - sync
  - codegen
  - openapi
  - offline-first

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  yaml: ^3.1.0

dev_dependencies:
  drift: ^2.20.0
  sqlite3: ^2.4.0
  super_sync:
  super_sync_drift:
  test: ^1.25.0
  very_good_analysis: ^10.0.0
