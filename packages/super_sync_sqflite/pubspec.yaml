name: super_sync_sqflite
description: >-
  A durable, sqflite-backed local store for super_sync. Persists records, the
  outbox and sync cursors in SQLite, with manual change notification for
  reactive reads.
version: 0.1.0
homepage: https://github.com/AndroidPoet/super_sync
repository: https://github.com/AndroidPoet/super_sync
issue_tracker: https://github.com/AndroidPoet/super_sync/issues

topics:
  - sync
  - offline-first
  - sqflite
  - sqlite
  - database

environment:
  sdk: ^3.10.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

resolution: workspace

dependencies:
  sqflite_common: ^2.5.0
  super_sync: ^0.1.0

dev_dependencies:
  sqflite_common_ffi: ^2.3.0
  test: ^1.25.0
  very_good_analysis: ^10.0.0
