name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed packages/super_sync/lib packages/super_sync/test
      - name: Analyze
        run: dart analyze packages/super_sync
      - name: Run tests
        run: dart test packages/super_sync
