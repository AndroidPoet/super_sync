name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The workspace includes a Flutter example app, so resolve with Flutter
      # (it bundles the Dart SDK used for the analyze/test steps below).
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Verify formatting
        run: >-
          dart format --output=none --set-exit-if-changed
          packages/super_sync/lib packages/super_sync/test
          packages/super_sync_drift/lib packages/super_sync_drift/test
          packages/super_sync_sqflite/lib packages/super_sync_sqflite/test
          packages/super_sync_codegen/lib packages/super_sync_codegen/test
      - name: Analyze
        run: >-
          dart analyze packages/super_sync packages/super_sync_drift
          packages/super_sync_sqflite packages/super_sync_codegen
      - name: Test core
        run: dart test packages/super_sync
      - name: Test drift store
        run: dart test packages/super_sync_drift
      - name: Test sqflite store
        run: dart test packages/super_sync_sqflite
      - name: Test codegen
        run: dart test packages/super_sync_codegen
